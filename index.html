<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Resources</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <div class="container">
        <h1>Northwind Databases</h1>
        <div class="download-buttons">
            <div class="button-group">
                <button class="main-btn northwind" data-name="Northwind">
                    Download Northwind
                </button>
                <div class="format-options" id="northwind-formats">
                    <a href="https://drive.google.com/uc?export=download&id=1K9F-qImf1YUVh-KPsFjf8OAph2nWs6al" class="format-btn bak" data-name="Northwind" data-format="bak">
                        <span class="indicator"></span>
                        .bak format
                    </a>
                    <a href="https://drive.google.com/uc?export=download&id=11AImf9K_HT81OTYbX0k1hadFTdTCfp0U" class="format-btn bacpac" data-name="Northwind" data-format="bacpac">
                        <span class="indicator"></span>
                        .bacpac format
                    </a>
                </div>
            </div>
            
            <div class="button-group">
                <button class="main-btn extended" data-name="Northwind Extended">
                    Download Northwind Extended
                </button>
                <div class="format-options" id="extended-formats">
                    <a href="https://drive.google.com/uc?export=download&id=1eTfCtHpgKpbvtx0XlkIrgTYD-Jtfa3ED" class="format-btn bak" data-name="Northwind Extended" data-format="bak">
                        <span class="indicator"></span>
                        .bak format
                    </a>
                    <a href="https://drive.google.com/uc?export=download&id=1ooBjGF-M9Oh7PCCOmhhr6vG8tO4TdvEJ" class="format-btn bacpac" data-name="Northwind Extended" data-format="bacpac">
                        <span class="indicator"></span>
                        .bacpac format
                    </a>
                </div>
            </div>
            
            <div class="button-row">
                <button id="theme-toggle">
                    ☀️ Light Mode
                </button>
            </div>
        </div>
        <div class="success-message"></div>
        <div class="footer">
            Made with ❤️ by <a href="https://github.com/ozkancirak" target="_blank" class="author-link">Özkan Çırak</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
