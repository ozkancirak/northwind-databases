<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Resources</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark-theme">
    <div class="container">
        <h1>Northwind Databases</h1>
        <div class="download-buttons">
            <div class="button-group">
                <button class="main-btn northwind" data-name="Northwind">
                    Download Northwind
                    <div class="tooltip">
                        <h3>Northwind Tables</h3>
                        <ul>
                            <li>Customers (5 rows)</li>
                            <li>OrderDetails (5 rows)</li>
                            <li>Products (5 rows)</li>
                        </ul>
                        <div class="tooltip-arrow"></div>
                    </div>
                </button>
                <div class="format-options" id="northwind-formats">
                    <a href="assets/databases/Northwind.bak" class="format-btn bak" data-name="Northwind" data-format="bak">
                        <span class="indicator"></span>
                        .bak format
                    </a>
                    <a href="assets/databases/Northwind.bacpac" class="format-btn bacpac" data-name="Northwind" data-format="bacpac">
                        <span class="indicator"></span>
                        .bacpac format
                    </a>
                </div>
            </div>
            
            <div class="button-group">
                <button class="main-btn extended" data-name="Northwind Extended">
                    Download Northwind Extended
                    <div class="tooltip">
                        <h3>Northwind Extended Tables</h3>
                        <ul>
                            <li>Customers (5 rows)</li>
                            <li>OrderDetails (10 rows)</li>
                            <li>Orders (5 rows)</li>
                            <li>Products (9 rows)</li>
                            <li>Suppliers (4 rows)</li>
                        </ul>
                        <div class="tooltip-arrow"></div>
                    </div>
                </button>
                <div class="format-options" id="extended-formats">
                    <a href="assets/databases/Northwind_Extended.bak" class="format-btn bak" data-name="Northwind Extended" data-format="bak">
                        <span class="indicator"></span>
                        .bak format
                    </a>
                    <a href="assets/databases/Northwind_Extended.bacpac" class="format-btn bacpac" data-name="Northwind Extended" data-format="bacpac">
                        <span class="indicator"></span>
                        .bacpac format
                    </a>
                </div>
            </div>
            
            <div class="button-row">
                <button id="theme-toggle">
                    ☀️ Light Mode
                </button>
            </div>
        </div>
        <div class="success-message"></div>
        <div class="footer">
            Made with ❤️ by <a href="https://github.com/ozkancirak" target="_blank" class="author-link">Özkan Çırak</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
