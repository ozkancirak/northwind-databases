<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Resources</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark-theme">
    <div class="container">
        <h1>Northwind Database</h1>
        <div class="download-buttons">
            <div class="button-group">
                <button class="main-btn northwind" data-name="Northwind">
                    Download Northwind
                    <div class="tooltip">
                        <h3>Northwind Tables</h3>
                        <ul>
                            <li>Customers (91 records)</li>
                            <li>Categories (8 records)</li>
                            <li>Employees (10 records)</li>
                            <li>OrderDetails (518 records)</li>
                            <li>Orders (196 records)</li>
                            <li>Products (77 records)</li>
                            <li>Shippers (3 records)</li>
                            <li>Suppliers (29 records)</li>
                        </ul>
                        <div class="tooltip-arrow"></div>
                    </div>
                </button>
                <div class="format-options" id="northwind-formats">
                    <a href="assets/databases/Northwind.bak" class="format-btn bak" data-name="Northwind" data-format="bak">
                        .bak format
                    </a>
                    <a href="assets/databases/Northwind.bacpac" class="format-btn bacpac" data-name="Northwind" data-format="bacpac">
                        .bacpac format
                    </a>
                </div>
            </div>
        </div>
        <div class="success-message"></div>
        <div class="footer">
            Made with ❤️ by <a href="https://github.com/ozkancirak" target="_blank" class="author-link">Özkan Çırak</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
